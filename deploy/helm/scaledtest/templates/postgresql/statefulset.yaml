{{- if .Values.database.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "scaledtest.fullname" . }}-postgresql
  labels:
    {{- include "scaledtest.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  serviceName: {{ include "scaledtest.fullname" . }}-postgresql
  replicas: 1
  selector:
    matchLabels:
      {{- include "scaledtest.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "scaledtest.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: database
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: {{ .Values.database.securityContext.fsGroup | default 1000 }}
      containers:
        - name: timescaledb
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          imagePullPolicy: {{ .Values.database.image.pullPolicy }}
          ports:
            - name: postgresql
              containerPort: {{ .Values.database.service.port | default 5432 }}
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.database.auth.username | default "scaledtest" | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "scaledtest.fullname" . }}-postgresql
                  key: password
            - name: POSTGRES_DB
              value: {{ .Values.database.auth.database | default "scaledtest" | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          securityContext:
            runAsUser: {{ .Values.database.securityContext.runAsUser | default 1000 }}
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U {{ .Values.database.auth.username | default "scaledtest" }} -d {{ .Values.database.auth.database | default "scaledtest" }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U {{ .Values.database.auth.username | default "scaledtest" }} -d {{ .Values.database.auth.database | default "scaledtest" }}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.database.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: initdb
          configMap:
            name: {{ include "scaledtest.fullname" . }}-postgresql-initdb
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "scaledtest.labels" . | nindent 10 }}
          app.kubernetes.io/component: database
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.database.persistence.storageClass }}
        storageClassName: {{ .Values.database.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.database.persistence.size | default "10Gi" }}
{{- end }}
