{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "scaledtest.fullname" . }}
  labels:
    {{- include "scaledtest.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if and .Values.ingress.tls.enabled .Values.ingress.host }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    {{- if .Values.ingress.host }}
    - host: {{ .Values.ingress.host | quote }}
      http:
    {{- else }}
    # Empty host catches all requests (works with localhost, any IP)
    - http:
    {{- end }}
        paths:
          # Connect-RPC/gRPC-Web routes (paths like /api.v1.AuthService/Login)
          # Must come before /api to match first due to regex
          - path: /api\..*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "scaledtest.fullname" . }}-backend
                port:
                  name: http
          # REST API routes to backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "scaledtest.fullname" . }}-backend
                port:
                  name: http
          # Health check endpoint
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: {{ include "scaledtest.fullname" . }}-backend
                port:
                  name: http
          # All other routes to frontend (SPA catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "scaledtest.fullname" . }}-frontend
                port:
                  name: http
{{- end }}
