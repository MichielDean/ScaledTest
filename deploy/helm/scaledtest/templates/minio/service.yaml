{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "scaledtest.fullname" . }}-minio
  labels:
    {{- include "scaledtest.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  type: {{ .Values.minio.service.type | default "ClusterIP" }}
  ports:
    - name: api
      port: {{ .Values.minio.service.apiPort | default 9000 }}
      targetPort: api
      protocol: TCP
      {{- if and (eq .Values.minio.service.type "NodePort") .Values.minio.service.apiNodePort }}
      nodePort: {{ .Values.minio.service.apiNodePort }}
      {{- end }}
    - name: console
      port: {{ .Values.minio.service.consolePort | default 9001 }}
      targetPort: console
      protocol: TCP
      {{- if and (eq .Values.minio.service.type "NodePort") .Values.minio.service.consoleNodePort }}
      nodePort: {{ .Values.minio.service.consoleNodePort }}
      {{- end }}
  selector:
    {{- include "scaledtest.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: minio
{{- end }}
