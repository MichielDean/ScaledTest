apiVersion: v1
kind: ServiceAccount
metadata:
  name: scaledtest-job-runner
  namespace: scaledtest
  labels:
    app: scaledtest
    component: job-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scaledtest-job-manager
  namespace: scaledtest
  labels:
    app: scaledtest
    component: job-manager
rules:
  # Job management
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Pod management (for logs and status)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Pod logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

  # Image pull secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "delete"]

  # PVC access
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scaledtest-job-manager-binding
  namespace: scaledtest
  labels:
    app: scaledtest
    component: job-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scaledtest-job-manager
subjects:
  - kind: ServiceAccount
    name: scaledtest-job-runner
    namespace: scaledtest
