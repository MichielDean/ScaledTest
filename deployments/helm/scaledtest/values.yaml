replicaCount: 1

image:
  repository: scaledtest
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: scaledtest.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

database:
  host: postgresql
  port: 5432
  name: scaledtest
  user: scaledtest
  existingSecret: scaledtest-db
  secretKey: password

auth:
  jwtSecret: ""
  existingSecret: scaledtest-auth
  jwtSecretKey: jwt-secret

migration:
  enabled: true

rbac:
  create: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

namespace: default
