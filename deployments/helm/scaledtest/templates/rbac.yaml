{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "scaledtest.fullname" . }}
  labels:
    {{- include "scaledtest.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "scaledtest.fullname" . }}
  labels:
    {{- include "scaledtest.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "scaledtest.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "scaledtest.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
