apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scaledtest.fullname" . }}
  labels:
    {{- include "scaledtest.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "scaledtest.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "scaledtest.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "scaledtest.serviceAccountName" . }}
      containers:
        - name: scaledtest
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ST_PORT
              value: "8080"
            - name: ST_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.secretKey }}
            - name: ST_DATABASE_URL
              value: "postgres://{{ .Values.database.user }}:$(ST_DB_PASSWORD)@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}?sslmode=disable"
            - name: ST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.jwtSecretKey }}
            - name: ST_K8S_NAMESPACE
              value: {{ .Values.namespace | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
