services:
  timescaledb:
    image: timescale/timescaledb:2.14.2-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scaledtest}
      POSTGRES_USER: ${POSTGRES_USER:-scaledtest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scaledtest} -d ${POSTGRES_DB:-scaledtest}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: []
    command: ["sh", "-c", "scaledtest -migrate-up && exec scaledtest"]
    environment:
      ST_DATABASE_URL: postgres://${POSTGRES_USER:-scaledtest}:${POSTGRES_PASSWORD:-password}@timescaledb:5432/${POSTGRES_DB:-scaledtest}?sslmode=disable
      ST_JWT_SECRET: ${ST_JWT_SECRET:-docker-compose-dev-secret-at-least-32-characters}
      ST_PORT: "8080"
      ST_BASE_URL: ${ST_BASE_URL:-http://localhost:3000}
    ports:
      - "3000:8080"
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescaledb_data:
