name: Pull Request Validation

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... -v

  go-integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: scaledtest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run store integration tests
        env:
          TEST_DATABASE_URL: postgres://test:test@localhost:5432/scaledtest_test?sslmode=disable
        run: make test-integration

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc -p tsconfig.json --noEmit

      - name: Build
        working-directory: frontend
        run: npx vite build

  jest-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest unit and component tests
        run: npm run test:ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-test-results
          path: ctrf-report.json
          if-no-files-found: ignore

  go-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [go-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npx vite build

      - name: Copy frontend dist to embed location
        run: |
          rm -f internal/spa/dist/placeholder
          cp -rf frontend/dist/* internal/spa/dist/

      - name: Build Go binary
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/scaledtest ./cmd/server

      - name: Build worker binary
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/scaledtest-worker ./cmd/worker
