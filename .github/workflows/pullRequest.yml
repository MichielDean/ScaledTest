name: Pull Request Validation

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    runs-on: self-hosted
    if: github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... -v

  go-integration-test:
    runs-on: self-hosted
    if: github.event.pull_request.head.repo.full_name == github.repository
    needs: [e2e-tests]
    timeout-minutes: 10
    services:
      postgres:
        image: timescale/timescaledb:2.14.2-pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: scaledtest_test
        ports:
          - 5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Run store integration tests
        env:
          TEST_DATABASE_URL: postgres://test:test@localhost:${{ job.services.postgres.ports[5432] }}/scaledtest_test?sslmode=disable
        run: make test-integration

  frontend-build:
    runs-on: self-hosted
    if: github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc -p tsconfig.json --noEmit

      - name: Build
        working-directory: frontend
        run: npx vite build

  jest-tests:
    runs-on: self-hosted
    if: github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

  go-build:
    runs-on: self-hosted
    if: github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 10
    needs: [go-test, frontend-build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          package-manager-cache: false

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npx vite build

      - name: Copy frontend dist to embed location
        run: |
          rm -f internal/spa/dist/placeholder
          cp -rf frontend/dist/* internal/spa/dist/

      - name: Build Go binary
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/scaledtest ./cmd/server

      - name: Build worker binary
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/scaledtest-worker ./cmd/worker

  e2e-tests:
    runs-on: self-hosted
    if: github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 20
    services:
      timescaledb:
        image: timescale/timescaledb:2.14.2-pg16
        env:
          POSTGRES_DB: scaledtest
          POSTGRES_USER: scaledtest
          POSTGRES_PASSWORD: password
        ports:
          - 5432
        options: >-
          --health-cmd "pg_isready -U scaledtest -d scaledtest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          package-manager-cache: false

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npx vite build

      - name: Copy frontend dist
        run: |
          rm -f internal/spa/dist/placeholder
          cp -rf frontend/dist/* internal/spa/dist/

      - name: Run migrations and start server
        env:
          ST_DATABASE_URL: postgres://scaledtest:password@localhost:${{ job.services.timescaledb.ports[5432] }}/scaledtest?sslmode=disable
          ST_JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
          ST_PORT: 3000
          ST_DISABLE_RATE_LIMIT: true
          BETTER_AUTH_SECRET: ${{ secrets.CI_BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: http://localhost:3000
        run: |
          go run ./cmd/server -migrate-up
          go run ./cmd/server &
          echo "Waiting for server..."
          for i in {1..20}; do
            curl -sf http://localhost:3000/api/v1/health && break || sleep 2
          done

      - name: Install Playwright
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Run E2E tests
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost:3000
        run: |
          npx playwright test \
            --reporter=html,github \
            --output=test-results

      - name: Upload Playwright screenshots
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: playwright-screenshots
          path: e2e/test-results/**/*.png
          retention-days: 30

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30
