name: Publish E2E Worker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.e2e-worker'
      - 'e2e/**'
      - 'cmd/worker/**'
      - 'go.mod'
      - 'go.sum'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push e2e-worker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.e2e-worker
          push: true
          tags: ghcr.io/michialdean/scaledtest/e2e-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
