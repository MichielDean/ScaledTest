apiVersion: v1
kind: Service
metadata:
  name: scaledtest
  namespace: scaledtest
  labels:
    app: scaledtest
spec:
  type: ClusterIP
  selector:
    app: scaledtest
    component: server
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
