apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaledtest
  namespace: scaledtest
  labels:
    app: scaledtest
    component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scaledtest
      component: server
  template:
    metadata:
      labels:
        app: scaledtest
        component: server
    spec:
      serviceAccountName: scaledtest
      containers:
        - name: scaledtest
          image: scaledtest/scaledtest:latest
          command: ['sh', '-c', 'scaledtest -migrate-up && exec scaledtest']
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: scaledtest-config
            - secretRef:
                name: scaledtest-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      restartPolicy: Always
