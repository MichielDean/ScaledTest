apiVersion: v1
kind: Secret
metadata:
  name: scaledtest-secrets
  namespace: scaledtest
type: Opaque
stringData:
  # REQUIRED: Replace these values before deploying.
  # Do NOT commit real secrets to version control.
  ST_DATABASE_URL: 'postgres://scaledtest:CHANGE_ME@timescaledb:5432/scaledtest?sslmode=require'
  ST_JWT_SECRET: 'CHANGE_ME_TO_A_RANDOM_STRING_AT_LEAST_32_CHARACTERS'
  ST_WORKER_TOKEN: 'CHANGE_ME_WORKER_AUTH_TOKEN'

  # Optional: OAuth credentials (leave empty to disable)
  ST_OAUTH_GITHUB_CLIENT_ID: ''
  ST_OAUTH_GITHUB_CLIENT_SECRET: ''
  ST_OAUTH_GOOGLE_CLIENT_ID: ''
  ST_OAUTH_GOOGLE_CLIENT_SECRET: ''
