apiVersion: v1
kind: ServiceAccount
metadata:
  name: scaledtest
  namespace: scaledtest
---
# RBAC: allow the app to manage Jobs in its namespace (for test execution workers)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scaledtest-job-manager
  namespace: scaledtest
rules:
  - apiGroups: ['batch']
    resources: ['jobs']
    verbs: ['create', 'get', 'list', 'watch', 'delete']
  - apiGroups: ['']
    resources: ['pods', 'pods/log']
    verbs: ['get', 'list', 'watch']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scaledtest-job-manager
  namespace: scaledtest
subjects:
  - kind: ServiceAccount
    name: scaledtest
    namespace: scaledtest
roleRef:
  kind: Role
  name: scaledtest-job-manager
  apiGroup: rbac.authorization.k8s.io
